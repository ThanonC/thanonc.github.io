<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="css/applyc.css" />
        <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
        <title>Send me a private message</title>
    </head>
    <body>
        <div class="wrapper">
            <h1>Send me a message!</h1>
            <form action="/sendme" method="post">
                <div class="input-dia">
                    <input type="text" name="text" placeholder="Please enter the message you want to send" maxlength="2000" required>
                </div>
                <input type="submit" value="Submit" class="btn">
            </form>
        </div>
    </body>
</html>
